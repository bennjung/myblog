name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Auto-date posts without date prefix
        run: |
          shopt -s globstar
          for file in _posts/**/*.md; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            if [[ ! "$filename" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}- ]]; then
              commit_date=$(git log --follow --diff-filter=A --format=%ai -- "$file" | tail -1 | cut -d' ' -f1)
              if [ -z "$commit_date" ]; then
                commit_date=$(date +"%Y-%m-%d")
              fi
              dir=$(dirname "$file")
              mv "$file" "${dir}/${commit_date}-${filename}"
              echo "Renamed: $file -> ${dir}/${commit_date}-${filename}"
            fi
          done
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
