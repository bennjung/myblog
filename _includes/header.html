<aside class="sidebar" id="sidebar">
  <a href="{{ '/' | relative_url }}" class="site-title">ggulgem</a>

  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>

  <nav>
    <ul class="sidebar-nav">
      <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
    </ul>

    <p class="nav-section-label">Writing</p>
    <ul class="sidebar-nav">
      <li><a href="{{ '/posts/' | relative_url }}" {% if page.url == '/posts/' %}class="active"{% endif %}>All</a></li>
      {% assign categories = site.posts | map: "category" | compact | uniq | sort %}
      {% for category in categories %}
      <li><a href="{{ '/categories/' | relative_url }}#{{ category }}" data-category="{{ category }}">{{ category }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</aside>

<script>
  document.getElementById('menuToggle').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('open');
  });

  function updateCategoryActive() {
    var hash = decodeURIComponent(window.location.hash.replace('#', ''));
    document.querySelectorAll('[data-category]').forEach(function(link) {
      if (link.dataset.category === hash) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
  }
  updateCategoryActive();
  window.addEventListener('hashchange', updateCategoryActive);
</script>
