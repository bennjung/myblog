---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%Y.%m.%d" }}
      {% if page.category %}
      <a class="post-category-badge" href="{{ '/categories/' | relative_url }}#{{ page.category }}">{{ page.category }}</a>
      {% endif %}
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <footer class="post-footer">
    <p class="post-nav">
      <a href="{{ '/' | relative_url }}">&larr; Back</a>
    </p>
  </footer>
</article>
