---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <span class="meta-label">Date:</span> {{ page.date | date: "%Y-%m-%d" }}
      {% if page.author %}
      <span class="meta-sep">//</span>
      <span class="meta-label">Author:</span> {{ page.author }}
      {% endif %}
    </p>
    <div class="post-rule">- - - - - - - - - - - - - - -</div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <footer class="post-footer">
    <div class="post-rule">- - - - - - - - - - - - - - -</div>
    <p class="post-nav">
      <a href="{{ '/' | relative_url }}">&lt;&lt; Back to Home</a>
    </p>
    <p class="last-updated">Last updated: {{ page.date | date: "%B %d, %Y at %H:%M" }}</p>
  </footer>
</article>
