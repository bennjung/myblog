---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %Y" }}</p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <footer class="post-footer">
    <p class="post-nav">
      <a href="{{ '/' | relative_url }}">&larr; Back</a>
    </p>
  </footer>
</article>
